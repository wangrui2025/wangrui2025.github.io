name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'gs_data_shieldsio.json'
      - 'astro/.astro/**'
      - 'assets/css/tailwind-custom.css'
      - '.github/workflows/update_google_scholar_stats.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('astro/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore Astro build cache
        uses: actions/cache@v4
        with:
          path: |
            astro/.astro
            astro/dist
          key: astro-cache-${{ runner.os }}-${{ hashFiles('astro/pnpm-lock.yaml') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd astro
          pnpm install --frozen-lockfile

      - name: Build Astro
        run: |
          cd astro
          pnpm run build

      - name: Replace Astro favicon with pikachu
        run: |
          # Download pre-generated pikachu icons from sprites-gallery
          curl -sL "https://raw.githubusercontent.com/wangrui2025/sprites-gallery/main/public/favicons/apple-touch-icon.png" -o astro/dist/apple-touch-icon.png
          curl -sL "https://raw.githubusercontent.com/wangrui2025/sprites-gallery/main/public/favicons/icon-32x32.png" -o astro/dist/favicon-32x32.png
          curl -sL "https://raw.githubusercontent.com/wangrui2025/sprites-gallery/main/public/favicons/icon-192x192.png" -o astro/dist/favicon-192x192.png
          echo "Favicons replaced from sprites-gallery"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
