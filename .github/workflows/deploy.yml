name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'gs_data_shieldsio.json'
      - 'astro/.astro/**'
      - 'assets/css/tailwind-custom.css'
      - '.github/workflows/update_google_scholar_stats.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: astro/package-lock.json

      - name: Restore Astro build cache
        uses: actions/cache@v4
        with:
          path: |
            astro/.astro
            astro/dist
          key: astro-cache-${{ runner.os }}-${{ hashFiles('astro/package-lock.json') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd astro
          npm ci

      - name: Build Astro
        run: |
          cd astro
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
