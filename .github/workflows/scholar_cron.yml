name: Scholar Cron Job

on:
  schedule:
    # 每周日 UTC 0 点运行一次
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 支持手动触发测试

permissions:
  contents: write  # 关键：授予写入权限用于自动 commit

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./google_scholar_crawler
        run: pip install -r requirements.txt

      - name: Run crawler
        working-directory: ./google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: python main.py

      - name: Commit and push gs_data.json
        run: |
          cd google-scholar-stats
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          if [ -f gs_data.json ]; then
            git add gs_data.json gs_data_shieldsio.json
            git diff --cached --quiet && echo "No changes to commit" || \
              git commit -m "Update Google Scholar stats - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "Warning: gs_data.json not found"
          fi
