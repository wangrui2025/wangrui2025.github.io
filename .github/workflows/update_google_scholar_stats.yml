name: Update Google Scholar Stats

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Google Scholar Data
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: python3 scripts/fetch_scholar.py

      - name: Commit changes if needed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add gs_data_shieldsio.json astro/src/content/scholar/stats.json

          if ! git diff --cached --quiet; then
            git commit -m "chore(scholar): update citation stats [skip ci]"
            git pull --rebase
            git push
          else
            echo "No changes to commit."
          fi

      - name: Update Public Gist
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -z "$GIST_PAT" ]; then
            echo "GIST_PAT not set, skipping gist update."
            exit 0
          fi

          jq -n --arg content "$(cat gs_data_shieldsio.json)" '{files: {"gs_data_shieldsio.json": {content: $content}}}' > gist_payload.json

          curl -sL \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/9a0ede1f5908df56fae05bd34def8c76 \
            -d @gist_payload.json
