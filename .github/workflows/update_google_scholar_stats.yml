name: Update Google Scholar Stats

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Scholar Data (OpenAlex)
        env:
          OPENALEX_AUTHOR_ID: ${{ secrets.OPENALEX_AUTHOR_ID }}
        run: python3 scripts/fetch_scholar.py

      - name: Commit changes if needed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add gs_data_shieldsio.json astro/src/content/scholar/stats.json

          if ! git diff --cached --quiet; then
            git commit -m "chore(scholar): update citation stats [skip ci]"
            git pull --rebase
            git push
          else
            echo "No changes to commit."
          fi

      - name: Update Public Gist
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -z "$GIST_PAT" ]; then
            echo "GIST_PAT not set, skipping gist update."
            exit 0
          fi

          jq -n --arg content "$(cat gs_data_shieldsio.json)" '{files: {"gs_data_shieldsio.json": {content: $content}}}' > gist_payload.json

          HTTP_CODE=$(curl -s -o gist_response.json -w "%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GIST_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/gists/9a0ede1f5908df56fae05bd34def8c76 \
            -d @gist_payload.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Gist 更新失败，HTTP 状态码: $HTTP_CODE"
            cat gist_response.json
            exit 1
          fi

          echo "Gist 更新成功。"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::工作流失败，请检查日志"
